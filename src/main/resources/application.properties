spring.application.name=micro-lending-platform

# DataSource - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/lending_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=microlend-super-secret-key-must-be-at-least-32-chars-long!
jwt.expiration-ms=86400000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

server.port=8081

# ?? Loan Repayment Config ??????????????????????????????????????????????????
# Grace period in days after EMI due date before penalty kicks in
# Example: loan on 20th ? due 20th of next month ? penalty starts 24th (3 days grace)
loan.repayment.grace-period-days=3

# Penal interest rate per annum applied on overdue EMI amount (24% = 0.24)
loan.repayment.penal-interest-rate=0.24

# Foreclosure penalty as a fraction of outstanding principal (2% = 0.02)
loan.repayment.foreclosure-penalty-rate=0.02